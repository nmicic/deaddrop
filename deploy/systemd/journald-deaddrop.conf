# Install to /etc/systemd/journald.conf.d/deaddrop.conf
# Ensures deaddrop-relay logs stay in RAM ring buffer only (D-40).
#
# NOTE: Storage=volatile affects ALL journal units on the host, not
# just deaddrop. If the operator needs persistent logging for other
# services, use MaxLevelStore= filtering or a per-unit approach.
[Journal]
Storage=volatile
