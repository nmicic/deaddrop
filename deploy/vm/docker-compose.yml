services:
  caddy:
    image: caddy:alpine
    container_name: deaddrop-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /run/deaddrop:/run/deaddrop
    environment:
      - SITE_ADDR=${SITE_ADDR}
      - CADDY_PREFIX=${CADDY_PREFIX}
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, DAC_READ_SEARCH]
    security_opt: [no-new-privileges:true]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "nc", "-z", "-w", "3", "localhost", "443"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
